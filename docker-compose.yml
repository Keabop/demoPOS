services:
  # Base de datos local para Evolution API y n8n
  postgres:
    image: postgres:15-alpine
    container_name: agromar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolutionPassword123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432" # Puerto 5433 expuesto para evitar conflictos con otras bases de datos locales

  # Servicio de Evolution API (WhatsApp)
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: agromar-evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=agromarApiKey123
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolutionPassword123@postgres:5432/evolution?sslmode=disable
      - CACHE_REDIS_ENABLED=false
    depends_on:
      - postgres

  # Servicio de n8n (Orquestador de Automatizaciones)
  n8n:
    image: n8nio/n8n:latest
    container_name: agromar-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres

volumes:
  postgres_data:
  n8n_data:
